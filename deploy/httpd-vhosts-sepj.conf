# ============================================================
# SEPJ Gabès — Apache VirtualHost Configuration
# File: deploy/httpd-vhosts-sepj.conf
#
# INSTRUCTIONS:
# 1. Replace PROJECT_PATH with the real path on your server
#    e.g.  C:/your/actual/path/to/sepj-gabes
# 2. Replace the SSLCertificateFile paths with your win-acme output paths
# 3. Copy (or include) this file into:
#    C:\xampp\apache\conf\extra\httpd-vhosts.conf
# 4. In C:\xampp\apache\conf\httpd.conf, ensure these lines are uncommented:
#    LoadModule ssl_module modules/mod_ssl.so
#    LoadModule socache_shmcb_module modules/mod_socache_shmcb.so
#    LoadModule rewrite_module modules/mod_rewrite.so
#    LoadModule headers_module modules/mod_headers.so
#    Include conf/extra/httpd-ssl.conf
#    Include conf/extra/httpd-vhosts.conf
# 5. Restart Apache in XAMPP Control Panel
# ============================================================

# ── HTTP → HTTPS redirect ────────────────────────────────────
<VirtualHost *:80>
    ServerName  sepjgabes.tn
    ServerAlias www.sepjgabes.tn

    # Force all traffic to HTTPS
    Redirect permanent / https://sepjgabes.tn/
</VirtualHost>

# ── HTTPS — main site ────────────────────────────────────────
<VirtualHost *:443>
    ServerName  sepjgabes.tn
    ServerAlias www.sepjgabes.tn

    # Document root = /public subfolder only
    # Sensitive dirs (app/, database/, install/) stay above web root
    DocumentRoot "PROJECT_PATH/public"

    # Allow the public dir; everything else defaults to deny
    <Directory "PROJECT_PATH/public">
        Options -Indexes +FollowSymLinks -MultiViews
        AllowOverride All
        Require all granted
    </Directory>

    # Explicitly deny the project root (belt-and-suspenders)
    <Directory "PROJECT_PATH">
        Require all denied
    </Directory>
    <Directory "PROJECT_PATH/public">
        Require all granted
    </Directory>

    # ── SSL (Let's Encrypt via win-acme) ─────────────────────
    SSLEngine on
    SSLProtocol             all -SSLv3 -TLSv1 -TLSv1.1
    SSLCipherSuite          ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384
    SSLHonorCipherOrder     off

    # win-acme default output paths (update if yours differ)
    SSLCertificateFile    "C:/ProgramData/win-acme/httpsacme-v02.api.letsencrypt.org/sepjgabes.tn-chain.pem"
    SSLCertificateKeyFile "C:/ProgramData/win-acme/httpsacme-v02.api.letsencrypt.org/sepjgabes.tn-key.pem"

    # ── Logs ─────────────────────────────────────────────────
    ErrorLog  "PROJECT_PATH/../logs/apache-error.log"
    CustomLog "PROJECT_PATH/../logs/apache-access.log" combined
</VirtualHost>
