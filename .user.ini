; SEPJ Gabès — PHP runtime tuning for OVH shared hosting
; This file is read by OVH (PHP via CGI/FPM) from the web root.
; It raises upload limits so admins can attach up to 20 images per article.

; Allow up to 20 files per request
max_file_uploads = 20

; Per-file and total POST size (20 images * 5MB = ~100MB headroom)
upload_max_filesize = 8M
post_max_size = 120M

; Give uploads time to process (seconds)
max_execution_time = 120
max_input_time = 120

; Memory headroom for image processing
memory_limit = 256M
